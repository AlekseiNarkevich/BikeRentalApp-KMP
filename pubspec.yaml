name: lab9_project4_narkevich
description: "Кроссплатформенное приложение велопроката для Лабораторной работы №9."
version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # Состояние
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Навигация
  go_router: ^14.2.1

  # Сеть
  dio: ^5.5.0

  # Карты (возвращаем для map_screen)
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Хранение данных
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.3.2
  json_annotation: ^4.9.0

  # Адаптивность и UI
  flutter_adaptive_scaffold: ^0.3.2
  animations: ^2.0.11
  fluttertoast: ^8.2.8
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  
  # Дополнительно
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  
  # Генераторы кода
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

  flutter_lints: ^5.0.0
  mockito: ^5.4.4
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "launcher_icon.png"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true
